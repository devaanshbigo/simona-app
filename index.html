<!DOCTYPE html>
<html>
<head>
    <title>Simona Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f8f9fa; margin-bottom: 80px; }
        .header { text-align: center; margin-bottom: 20px; }
        .blessing { font-style: italic; color: #95a5a6; font-size: 0.9em; }
        
        /* Search Bar Styling */
        #searchBar { 
            width: 100%; padding: 15px; margin-bottom: 25px; box-sizing: border-box;
            border-radius: 25px; border: 1px solid #dfe6e9; font-size: 16px;
        }

        /* Design Cards */
        .card { 
            background: white; padding: 20px; margin-bottom: 15px; 
            border-radius: 15px; border-left: 6px solid #d4a017; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .design-no { font-size: 1.4em; font-weight: bold; }
        .price { color: #27ae60; font-weight: 600; font-size: 1.1em; }

        /* Floating Plus Button */
        .fab { 
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; 
            background: #d4a017; color: white; border-radius: 50%; font-size: 30px;
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 100;
        }

        /* Form Popup Styling */
        #formModal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; }
        .form-content { background: white; margin: 2% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .calc-box { background: #fffcf5; padding: 15px; border-radius: 10px; border: 1px dashed #d4a017; margin: 15px 0; }
        .calc-row { display: flex; justify-content: space-between; margin: 5px 0; font-weight: bold; }
        .save-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; }
    </style>
</head>
<body>

    <div class="header">
        <div class="blessing">"SHREE"</div>
        <h1>Simona Design List</h1>
    </div>

    <input type="text" id="searchBar" placeholder="Search Design No..." onkeyup="filterData()">

    <div id="display-area">Loading Simona database...</div>

    <div class="fab" onclick="openForm()">+</div>

    <div id="formModal">
        <div class="form-content">
            <h2 style="color:#d4a017; margin-top:0">New Design Entry</h2>
            <input type="text" id="designNo" placeholder="Design No (e.g. 205/A)" style="margin-bottom:15px">
            
            <div id="fabric-inputs"></div>

            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <input type="number" id="hand" placeholder="Handwork" oninput="calculate()">
                <input type="number" id="stitch" placeholder="Stitching" oninput="calculate()">
                <input type="number" id="pack" placeholder="Packing" oninput="calculate()">
            </div>

            <div class="calc-box">
                <div class="calc-row"><span>Total Cost:</span><span id="viewTotalCost">₹0</span></div>
                <input type="number" id="wholesale" placeholder="Set Wholesale Price" oninput="calculate()" style="margin-top:10px; border: 2px solid #27ae60">
                <div class="calc-row" style="margin-top:10px"><span>Expected Profit:</span><span id="viewProfit">₹0 (0%)</span></div>
            </div>

            <button class="save-btn" id="saveButton" onclick="saveEntry()">Save to Google Sheet</button>
            <button onclick="closeForm()" style="width:100%; background:none; border:none; color:red; margin-top:10px; cursor:pointer">Cancel</button>
        </div>
    </div>

    <script>
        // Use your NEW Web App URL ending in /exec
        const mySheetUrl = "https://script.google.com/macros/s/AKfycby6im_Yzw3aK-TqWnIt-mxflF13LkEwMC12QjWRdg8hNVZ1kdO-bqbM2mEaXfKR5saCcw/exec"; 
        let allData = [];

        // Generate Fabric Inputs
        let fabricHtml = "";
        for(let i=1; i<=6; i++) {
            fabricHtml += `<div class="grid">
                <input type="text" id="f${i}n" placeholder="Fabric ${i} Name">
                <input type="number" id="f${i}q" placeholder="Qty" oninput="calculate()">
                <input type="number" id="f${i}r" placeholder="Rate" oninput="calculate()">
            </div>`;
        }
        document.getElementById('fabric-inputs').innerHTML = fabricHtml;

        // Fetch and Display Data
        async function loadData() {
            try {
                const response = await fetch(mySheetUrl);
                allData = await response.json();
                renderCards(allData);
            } catch (err) {
                document.getElementById('display-area').innerHTML = "Error connecting to Simona Sheet.";
            }
        }

        function renderCards(dataList) {
            let html = "";
            dataList.forEach(row => {
                if (row[0]) {
                    html += `
                        <div class="card">
                            <div class="design-no">Design: ${row[0]}</div>
                            <div class="price">Wholesale: ₹${row[25]}</div>
                            <div style="font-size:0.9em; color:#888">Profit: ₹${row[26]}</div>
                        </div>`;
                }
            });
            document.getElementById('display-area').innerHTML = html;
        }

        // Search/Filter logic
        function filterData() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const filtered = allData.filter(row => row[0].toString().toLowerCase().includes(term));
            renderCards(filtered);
        }

        // Calculator logic
        function calculate() {
            let totalFabric = 0;
            for(let i=1; i<=6; i++) {
                let q = parseFloat(document.getElementById(`f${i}q`).value) || 0;
                let r = parseFloat(document.getElementById(`f${i}r`).value) || 0;
                totalFabric += (q * r);
            }
            let other = (parseFloat(document.getElementById('hand').value) || 0) +
                        (parseFloat(document.getElementById('stitch').value) || 0) +
                        (parseFloat(document.getElementById('pack').value) || 0);
            
            let totalCost = totalFabric + other;
            let wholesale = parseFloat(document.getElementById('wholesale').value) || 0;
            let profit = wholesale - totalCost;
            let margin = wholesale > 0 ? (profit / wholesale) * 100 : 0;

            document.getElementById('viewTotalCost').innerText = "₹" + totalCost.toFixed(2);
            document.getElementById('viewProfit').innerText = "₹" + profit.toFixed(2) + " (" + margin.toFixed(1) + "%)";
            document.getElementById('viewProfit').style.color = profit >= 0 ? "#27ae60" : "#e74c3c";
        }

        // Save logic
        async function saveEntry() {
            document.getElementById('saveButton').innerText = "Sending...";
            const data = {
                designNo: document.getElementById('designNo').value,
                f1n: document.getElementById('f1n').value, f1q: document.getElementById('f1q').value, f1r: document.getElementById('f1r').value,
                f2n: document.getElementById('f2n').value, f2q: document.getElementById('f2q').value, f2r: document.getElementById('f2r').value,
                f3n: document.getElementById('f3n').value, f3q: document.getElementById('f3q').value, f3r: document.getElementById('f3r').value,
                f4n: document.getElementById('f4n').value, f4q: document.getElementById('f4q').value, f4r: document.getElementById('f4r').value,
                f5n: document.getElementById('f5n').value, f5q: document.getElementById('f5q').value, f5r: document.getElementById('f5r').value,
                f6n: document.getElementById('f6n').value, f6q: document.getElementById('f6q').value, f6r: document.getElementById('f6r').value,
                hand: document.getElementById('hand').value, stitch: document.getElementById('stitch').value,
                pack: document.getElementById('pack').value, wholesale: document.getElementById('wholesale').value
            };

            await fetch(mySheetUrl, { method: "POST", body: JSON.stringify(data) });
            closeForm();
            loadData(); // Reload list after saving
            document.getElementById('saveButton').innerText = "Save to Google Sheet";
        }

        function openForm() { document.getElementById('formModal').style.display = "block"; }
        function closeForm() { document.getElementById('formModal').style.display = "none"; }

        loadData();
    </script>
</body>
</html>
