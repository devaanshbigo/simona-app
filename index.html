<!DOCTYPE html>
<html>
<head>
    <title>Simona Management Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #f8f9fa; margin-bottom: 80px; color: #2c3e50; }
        .header { text-align: center; margin-bottom: 20px; }
        .blessing { font-style: italic; color: #95a5a6; font-size: 0.8em; }
        #searchBar { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 25px; border: 1px solid #dfe6e9; font-size: 16px; outline: none; box-sizing: border-box; }

        /* Card Styling */
        .card { background: white; padding: 18px; margin-bottom: 15px; border-radius: 15px; border-left: 6px solid #d4a017; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; cursor: pointer; }
        .design-no { font-size: 1.3em; font-weight: bold; }
        .price { color: #27ae60; font-weight: 600; margin: 5px 0; }
        
        /* Action Buttons */
        .delete-btn { position: absolute; top: 15px; right: 15px; background: #ff7675; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7em; font-weight: bold; }
        .order-btn { position: absolute; top: 15px; right: 75px; background: #27ae60; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7em; font-weight: bold; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 200; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: auto; }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 20px; width: 85%; max-width: 450px; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
        
        .save-btn { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .fab { position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; background: #d4a017; color: white; border-radius: 50%; font-size: 35px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 100; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="header">
        <div class="blessing">"SHREE"</div>
        <h1>Simona Design List</h1>
    </div>

    <input type="text" id="searchBar" placeholder="Search Design No..." onkeyup="filterData()">
    <div id="display-area">Loading Data...</div>

    <div class="fab" onclick="alert('Use the cards to place orders or delete. Use Sheet for new costs.')">+</div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h2 style="color:#27ae60; margin-top:0">New Order: <span id="orderDesignLabel"></span></h2>
            <input type="text" id="partyName" placeholder="Party / Client Name">
            <input type="text" id="sizeBreakdown" placeholder="Size Breakdown (e.g. 2-L, 4-XL)">
            <input type="number" id="orderQty" placeholder="Quantity Ordered">
            <input type="number" id="orderRate" placeholder="Rate / Piece">
            <label style="font-size: 0.8em; color: #666;">Target Delivery Date:</label>
            <input type="date" id="targetDate">
            <button class="save-btn" onclick="saveOrder()">Confirm Order</button>
            <button onclick="closeModal('orderModal')" style="width:100%; background:none; border:none; color:red; margin-top:15px; cursor:pointer; font-weight:bold">Cancel</button>
        </div>
    </div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal('detailsModal')" style="float:right; cursor:pointer; font-size:28px;">&times;</span>
            <h2 style="color:#d4a017; margin-top:0">Full Details</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // PASTE YOUR NEW DEPLOYMENT URL BELOW
        const mySheetUrl = "https://script.google.com/macros/s/AKfycbyq5EgMclOCQ97lUoWOgrsHsqq7E5m4bUGwILsUukqtPi46heEsEve35bs5DvxIJb3wTg/exec"; 
        
        let allData = [];
        const labels = ["Design No", "F1 Name", "F1 Qty", "F1 Rate", "F2 Name", "F2 Qty", "F2 Rate", "F3 Name", "F3 Qty", "F3 Rate", "F4 Name", "F4 Qty", "F4 Rate", "F5 Name", "F5 Qty", "F5 Rate", "F6 Name", "F6 Qty", "F6 Rate", "Total Fabric", "Dye Cost", "Handwork", "Stitching", "Packing", "Total Cost", "Wholesale Rate", "Total Profit"];

        async function loadData() {
            try {
                const res = await fetch(mySheetUrl);
                allData = await res.json();
                renderCards(allData);
            } catch(e) { document.getElementById('display-area').innerHTML = "Check your URL and try again."; }
        }

        function renderCards(data) {
            let html = "";
            data.forEach((row, index) => {
                if(row[0]) {
                    html += `
                    <div class="card">
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteEntry('${row[0]}')">Delete</button>
                        <button class="order-btn" onclick="event.stopPropagation(); openOrderForm('${row[0]}', '${row[25]}')">Order</button>
                        <div onclick="showDetails(${index})">
                            <div class="design-no">${row[0]}</div>
                            <div class="price">Wholesale: ₹${row[25] || '0'}</div>
                            <small style="color:#d4a017">Tap for details →</small>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('display-area').innerHTML = html || "No designs found.";
        }

        function showDetails(index) {
            const row = allData[index];
            let bHtml = "";
            row.forEach((val, i) => { if(labels[i]) bHtml += `<div class="detail-row"><span>${labels[i]}</span><b>${val || '-'}</b></div>`; });
            document.getElementById('modalBody').innerHTML = bHtml;
            document.getElementById('detailsModal').style.display = "block";
        }

        function openOrderForm(designNo, rate) {
            document.getElementById('orderDesignLabel').innerText = designNo;
            document.getElementById('orderRate').value = rate;
            document.getElementById('orderModal').style.display = "block";
        }

        async function saveOrder() {
            const d = {
                targetSheet: 'OrderSheet',
                designNo: document.getElementById('orderDesignLabel').innerText,
                partyName: document.getElementById('partyName').value,
                sizeBreakdown: document.getElementById('sizeBreakdown').value,
                qty: document.getElementById('orderQty').value,
                rate: document.getElementById('orderRate').value,
                targetDate: document.getElementById('targetDate').value
            };
            await fetch(mySheetUrl, { method: "POST", body: JSON.stringify(d) });
            alert("Order sent to DG Order Sheet!");
            closeModal('orderModal');
            loadData();
        }

        async function deleteEntry(designNo) {
            if(confirm("Delete Design " + designNo + " from the sheet?")) {
                await fetch(mySheetUrl, { method: "POST", body: JSON.stringify({action: 'delete', designNo: designNo}) });
                loadData();
            }
        }

        function filterData() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            renderCards(allData.filter(r => r[0].toString().toLowerCase().includes(term)));
        }

        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        loadData();
    </script>
</body>
</html>
